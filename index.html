<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreasureHub - 雲端珍藏管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .item-card:hover .item-overlay { opacity: 1; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- 登入頁面 -->
    <div id="login-screen" class="h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-10 text-center border border-slate-100">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-xl shadow-indigo-100 rotate-3">
                <i class="fas fa-box-open text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2 italic">TreasureHub</h1>
            <p class="text-slate-500 mb-10 leading-relaxed">您的私人雲端收藏櫃<br>登入後即可同步所有珍藏數據</p>
            <button id="btn-google-login" class="w-full flex items-center justify-center gap-4 bg-slate-900 hover:bg-black text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg active:scale-95">
                <i class="fab fa-google"></i>
                使用 Google 快速登入
            </button>
        </div>
    </div>

    <!-- 主應用程式介面 -->
    <div id="app-screen" class="hidden min-h-screen flex">
        <!-- 側邊欄 -->
        <nav class="fixed left-0 top-0 h-full w-20 md:w-64 bg-white border-r border-slate-200 z-30 hidden sm:flex flex-col p-6">
            <div class="flex items-center gap-3 mb-12">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md">
                    <i class="fas fa-cube text-xl"></i>
                </div>
                <span class="font-black text-xl hidden md:block tracking-tighter italic text-indigo-900">TreasureHub</span>
            </div>
            
            <div class="flex-1">
                <button class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl bg-indigo-50 text-indigo-700 shadow-sm">
                    <i class="fas fa-th-large text-lg"></i>
                    <span class="font-bold hidden md:block">我的館藏</span>
                </button>
            </div>

            <div class="mt-auto border-t border-slate-100 pt-6">
                <div class="flex items-center gap-3 px-2 mb-6">
                    <img id="user-avatar" src="" alt="" class="w-10 h-10 rounded-full bg-slate-100 ring-2 ring-indigo-50">
                    <div class="hidden md:block overflow-hidden">
                        <p id="user-name" class="text-sm font-black truncate">收藏家</p>
                        <p id="user-uid" class="text-[10px] text-slate-400 truncate uppercase font-bold"></p>
                    </div>
                </div>
                <button id="btn-logout" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-bold">
                    <i class="fas fa-sign-out-alt text-lg"></i>
                    <span class="hidden md:block">安全登出</span>
                </button>
            </div>
        </nav>

        <!-- 主內容 -->
        <main class="flex-1 sm:ml-20 md:ml-64 p-6 md:p-10 pb-32">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
                <div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight">數位陳列室</h1>
                    <p class="text-slate-400 mt-2 font-medium flex items-center gap-2">
                        <i class="fas fa-tag text-indigo-500"></i>
                        目前共有 <span id="stats-total-count">0</span> 件珍藏在雲端同步中
                    </p>
                </div>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl flex items-center justify-center gap-3 font-black shadow-xl shadow-indigo-200 transition-all">
                    <i class="fas fa-plus"></i>
                    新增珍藏
                </button>
            </header>

            <!-- 數據卡片 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">總估計價值</p>
                    <p id="stats-value" class="text-2xl font-black text-slate-900">$0</p>
                </div>
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">投資成本</p>
                    <p id="stats-cost" class="text-2xl font-black text-slate-900">$0</p>
                </div>
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">預估收益</p>
                    <p id="stats-profit" class="text-2xl font-black text-slate-900">$0</p>
                </div>
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">成長率</p>
                    <p id="stats-growth" class="text-2xl font-black text-slate-900">0%</p>
                </div>
            </div>

            <!-- 展示區 -->
            <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- JavaScript 將在此注入卡片 -->
            </div>
            
            <div id="empty-state" class="hidden py-32 text-center bg-white rounded-[40px] border-4 border-dashed border-slate-100">
                <i class="fas fa-image text-5xl text-slate-200 mb-6"></i>
                <h3 class="text-xl font-bold text-slate-400">尚無館藏記錄</h3>
            </div>
        </main>
    </div>

    <!-- 編輯視窗 -->
    <div id="item-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row h-full max-h-[800px]">
            <!-- 左側圖片 -->
            <div class="md:w-5/12 bg-slate-50 p-8 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-100">
                <div onclick="document.getElementById('file-input').click()" class="w-full aspect-square bg-white rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-slate-200 overflow-hidden cursor-pointer relative group">
                    <img id="img-preview" src="" class="hidden w-full h-full object-cover">
                    <div id="img-placeholder" class="text-center">
                        <i class="fas fa-camera text-4xl text-slate-200 mb-4"></i>
                        <p class="text-sm font-bold text-slate-400">點擊上傳照片</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
                <p class="mt-6 text-[10px] text-slate-400 font-bold uppercase text-center">建議小於 800KB</p>
            </div>
            <!-- 右側表單 -->
            <div class="md:w-7/12 flex flex-col">
                <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                    <h2 id="modal-title" class="text-2xl font-black text-slate-800">新增館藏</h2>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-2xl"></i></button>
                </div>
                <div class="p-8 overflow-y-auto flex-1 space-y-4">
                    <input type="hidden" id="item-id">
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase mb-1">名稱</label>
                        <input type="text" id="form-name" class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-1">分類</label>
                            <select id="form-category" class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                                <option>鐘錶</option><option>藝術品</option><option>潮流玩具</option><option>書籍</option><option>其他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-1">狀態</label>
                            <select id="form-status" class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                                <option>全新</option><option>良好</option><option>已拆擺</option><option>損壞</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-1">成本 (USD)</label>
                            <input type="number" id="form-cost" class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-1">估值 (USD)</label>
                            <input type="number" id="form-value" class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-2xl font-bold">
                        </div>
                    </div>
                </div>
                <div class="p-8 bg-slate-50 flex gap-4">
                    <button id="btn-save" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-black shadow-xl">儲存至雲端</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK 導入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCnvlBKW8ZqO6pMiyUhR3lLl-qCZijw5_U",
            authDomain: "collector-31093.firebaseapp.com",
            projectId: "collector-31093",
            storageBucket: "collector-31093.firebasestorage.app",
            messagingSenderId: "755711111281",
            appId: "1:755711111281:web:9ef39b9b5fea162f30ebd0"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = "collector-31093-app";

        let currentUser = null;
        let base64Image = "";

        // UI 元素
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const btnLogin = document.getElementById('btn-google-login');
        const btnLogout = document.getElementById('btn-logout');
        const itemsGrid = document.getElementById('items-grid');
        const emptyState = document.getElementById('empty-state');

        // 登入狀態監聽
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL || '';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-uid').innerText = user.uid.substring(0, 8);
                loadItems();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // 登入事件
        btnLogin.onclick = () => signInWithPopup(auth, provider).catch(console.error);
        btnLogout.onclick = () => signOut(auth).catch(console.error);

        // 讀取數據 (遵守 RULE 1 & 2)
        function loadItems() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'collections');
            onSnapshot(colRef, (snapshot) => {
                const allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // 前端過濾
                const userItems = allData.filter(item => item.ownerId === currentUser.uid);
                renderItems(userItems);
                updateStats(userItems);
            }, (err) => console.error("Firestore Error:", err));
        }

        function renderItems(items) {
            itemsGrid.innerHTML = "";
            if (items.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[40px] border border-slate-200 overflow-hidden group hover:shadow-2xl transition-all duration-500 hover:-translate-y-2";
                card.innerHTML = `
                    <div class="aspect-[5/4] overflow-hidden relative">
                        <img src="${item.image || ''}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-indigo-900/60 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-4">
                            <button onclick="editItem('${item.id}', ${JSON.stringify(item).replace(/"/g, '&quot;')})" class="p-4 bg-white rounded-2xl text-slate-900"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem('${item.id}')" class="p-4 bg-white rounded-2xl text-red-600"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="p-6 text-center border-t border-slate-50">
                        <h3 class="font-black text-slate-800 truncate">${item.name}</h3>
                        <p class="text-xl font-black text-indigo-600">$${Number(item.currentValue).toLocaleString()}</p>
                    </div>
                `;
                itemsGrid.appendChild(card);
            });
        }

        function updateStats(items) {
            const cost = items.reduce((s, i) => s + (Number(i.purchasePrice) || 0), 0);
            const val = items.reduce((s, i) => s + (Number(i.currentValue) || 0), 0);
            document.getElementById('stats-total-count').innerText = items.length;
            document.getElementById('stats-value').innerText = `$${val.toLocaleString()}`;
            document.getElementById('stats-cost').innerText = `$${cost.toLocaleString()}`;
            document.getElementById('stats-profit').innerText = `$${(val - cost).toLocaleString()}`;
            document.getElementById('stats-growth').innerText = cost > 0 ? `${((val-cost)/cost*100).toFixed(1)}%` : '0%';
        }

        // 圖片處理
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('img-preview').src = base64Image;
                    document.getElementById('img-preview').classList.remove('hidden');
                    document.getElementById('img-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // 儲存邏輯
        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('item-id').value;
            const payload = {
                name: document.getElementById('form-name').value,
                category: document.getElementById('form-category').value,
                status: document.getElementById('form-status').value,
                purchasePrice: document.getElementById('form-cost').value,
                currentValue: document.getElementById('form-value').value,
                image: base64Image,
                ownerId: currentUser.uid,
                updatedAt: new Date().toISOString()
            };

            if (!payload.name) return alert("請輸入名稱");

            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'collections', id), payload);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'collections'), payload);
                }
                closeModal();
            } catch (err) {
                console.error(err);
                alert("儲存失敗，請檢查圖片是否過大");
            }
        };

        // 全域函數綁定 (為了讓 HTML onclick 能呼叫)
        window.openModal = () => {
            document.getElementById('item-id').value = "";
            document.getElementById('form-name').value = "";
            document.getElementById('form-cost').value = "";
            document.getElementById('form-value').value = "";
            document.getElementById('img-preview').classList.add('hidden');
            document.getElementById('img-placeholder').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "新增館藏";
            base64Image = "";
            document.getElementById('item-modal').classList.add('modal-active');
        };

        window.closeModal = () => document.getElementById('item-modal').classList.remove('modal-active');

        window.editItem = (id, data) => {
            document.getElementById('item-id').value = id;
            document.getElementById('form-name').value = data.name;
            document.getElementById('form-category').value = data.category;
            document.getElementById('form-status').value = data.status;
            document.getElementById('form-cost').value = data.purchasePrice;
            document.getElementById('form-value').value = data.currentValue;
            base64Image = data.image || "";
            if (base64Image) {
                document.getElementById('img-preview').src = base64Image;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('img-placeholder').classList.add('hidden');
            }
            document.getElementById('modal-title').innerText = "編輯資料";
            document.getElementById('item-modal').classList.add('modal-active');
        };

        window.deleteItem = async (id) => {
            if (confirm("確定要刪除嗎？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'collections', id));
            }
        };
    </script>
</body>
</html>
